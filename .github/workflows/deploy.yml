name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    env:
      CLAWFLARE_PUBLIC_BASE_URL: https://clawflare.omattic.com
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLAWFLARE_GATEWAY_TOKEN: ${{ secrets.CLAWFLARE_GATEWAY_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      TELEGRAM_ALLOWED_USER_IDS: ${{ secrets.TELEGRAM_ALLOWED_USER_IDS }}
      TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4.90.0 deploy

      - name: Sync Worker secrets
        run: |
          printf '%s' "$CLAWFLARE_GATEWAY_TOKEN" | npx wrangler@4.90.0 secret put CLAWFLARE_GATEWAY_TOKEN
          printf '%s' "$TELEGRAM_BOT_TOKEN" | npx wrangler@4.90.0 secret put TELEGRAM_BOT_TOKEN
          printf '%s' "$TELEGRAM_WEBHOOK_SECRET" | npx wrangler@4.90.0 secret put TELEGRAM_WEBHOOK_SECRET
          printf '%s' "$TELEGRAM_ALLOWED_USER_IDS" | npx wrangler@4.90.0 secret put TELEGRAM_ALLOWED_USER_IDS
          printf '%s' "$OPENAI_API_KEY" | npx wrangler@4.90.0 secret put OPENAI_API_KEY
          if [ -n "${TELEGRAM_BOT_USERNAME:-}" ]; then
            printf '%s' "$TELEGRAM_BOT_USERNAME" | npx wrangler@4.90.0 secret put TELEGRAM_BOT_USERNAME
          fi

      - name: Sync Telegram webhook
        run: pnpm telegram:webhook:sync
